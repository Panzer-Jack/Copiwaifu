name: 'publish'

on:
  push:
    tags:
      - 'app-v*'
  workflow_dispatch:

# On each push to an `app-v*` tag it will create or update a GitHub release,
# build the app, and upload the artifacts to the release.

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # for Arm based macs (M1 and above).
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest' # for Intel based macs.
            args: '--target x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: '--bundles nsis,msi'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          cache: true

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install Windows bundling tools
        if: matrix.platform == 'windows-latest'
        run: choco install nsis wixtoolset --no-progress -y

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: validate updater key
        shell: bash
        run: |
          printf '%s' "${{ secrets.TAURI_PRIVATE_KEY }}" > "$RUNNER_TEMP/tauri.key"
          echo test > "$RUNNER_TEMP/tauri-sign-test.txt"
          pnpm tauri signer sign "$RUNNER_TEMP/tauri-sign-test.txt" -f "$RUNNER_TEMP/tauri.key" -p "${{ secrets.TAURI_KEY_PASSWORD }}"

      - uses: tauri-apps/tauri-action@v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: app-v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version.
          releaseName: 'App v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
